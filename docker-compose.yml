name: workspace-ecommerce

services:
  api:
    build:
      context: .
      dockerfile: src/WorkspaceEcommerce.Api/Dockerfile
      target: final
    image: workspace-ecommerce-api:local
    container_name: workspace-ecommerce-api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080;https://+:8443
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/workspace-ecommerce-devcert.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: ${ASPNETCORE_HTTPS_CERT_PASSWORD:?Set ASPNETCORE_HTTPS_CERT_PASSWORD in .env}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:?Set POSTGRES_DB in .env};Username=${POSTGRES_USER:?Set POSTGRES_USER in .env};Password=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      AdminAuth__Email: ${AdminAuth__Email:?Set AdminAuth__Email in .env}
      AdminAuth__Password: ${AdminAuth__Password:?Set AdminAuth__Password in .env}
      Jwt__Issuer: ${Jwt__Issuer:?Set Jwt__Issuer in .env}
      Jwt__Audience: ${Jwt__Audience:?Set Jwt__Audience in .env}
      Jwt__SigningKey: ${Jwt__SigningKey:?Set Jwt__SigningKey in .env}
      Jwt__AccessTokenMinutes: ${Jwt__AccessTokenMinutes:-60}
    ports:
      - "${API_PORT:-5080}:8080"
      - "${API_HTTPS_PORT:-5443}:8443"
    volumes:
      - ./.certs:/https:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: workspace-ecommerce-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: src/WorkspaceEcommerce.Api/Dockerfile
      target: migrate
    image: workspace-ecommerce-api-migrate:local
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:?Set POSTGRES_DB in .env};Username=${POSTGRES_USER:?Set POSTGRES_USER in .env};Password=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      AdminAuth__Email: ${AdminAuth__Email:?Set AdminAuth__Email in .env}
      AdminAuth__Password: ${AdminAuth__Password:?Set AdminAuth__Password in .env}
      Jwt__Issuer: ${Jwt__Issuer:?Set Jwt__Issuer in .env}
      Jwt__Audience: ${Jwt__Audience:?Set Jwt__Audience in .env}
      Jwt__SigningKey: ${Jwt__SigningKey:?Set Jwt__SigningKey in .env}
      Jwt__AccessTokenMinutes: ${Jwt__AccessTokenMinutes:-60}
    depends_on:
      postgres:
        condition: service_healthy

  seed-demo:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: src/WorkspaceEcommerce.Api/Dockerfile
      target: final
    image: workspace-ecommerce-api:local
    command: ["--seed-demo"]
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:?Set POSTGRES_DB in .env};Username=${POSTGRES_USER:?Set POSTGRES_USER in .env};Password=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      AdminAuth__Email: ${AdminAuth__Email:?Set AdminAuth__Email in .env}
      AdminAuth__Password: ${AdminAuth__Password:?Set AdminAuth__Password in .env}
      Jwt__Issuer: ${Jwt__Issuer:?Set Jwt__Issuer in .env}
      Jwt__Audience: ${Jwt__Audience:?Set Jwt__Audience in .env}
      Jwt__SigningKey: ${Jwt__SigningKey:?Set Jwt__SigningKey in .env}
      Jwt__AccessTokenMinutes: ${Jwt__AccessTokenMinutes:-60}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
